# =============================================================================
# Kinship Classification - Docker Compose Configuration
# =============================================================================
# This file provides easy orchestration for running the kinship models.
#
# Usage:
#   NVIDIA GPU:  docker-compose --profile nvidia up
#   AMD GPU:     docker-compose --profile amd up
#
# Environment Variables (set before running):
#   EPOCHS=50          - Number of training epochs
#   BATCH_SIZE=16      - Training batch size
#   GPU_ID=0           - GPU device ID
#   LEARNING_RATE=1e-4 - Learning rate
#
# Example:
#   EPOCHS=100 BATCH_SIZE=32 docker-compose --profile nvidia up
# =============================================================================

# =============================================================================
# Shared configuration
# =============================================================================
x-nvidia-common: &nvidia-common
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-amd-common: &amd-common
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add:
    - video

x-training-env: &training-env
  EPOCHS: ${EPOCHS:-50}
  BATCH_SIZE: ${BATCH_SIZE:-16}
  GPU_ID: ${GPU_ID:-0}
  LEARNING_RATE: ${LEARNING_RATE:-1e-4}
  TRAIN_DATASET: ${TRAIN_DATASET:-fiw}

x-dataset-volumes: &dataset-volumes
  - ./data/FIW:/app/data/FIW:ro
  - ./data/KinFaceW-I:/app/data/KinFaceW-I:ro
  - ./data/KinFaceW-II:/app/data/KinFaceW-II:ro

services:
  # ===========================================================================
  # NVIDIA GPU Services
  # ===========================================================================
  nvidia-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-pipeline
    <<: *nvidia-common
    volumes:
      - ./data/FIW:/app/data/FIW:ro
      - ./data/KinFaceW-I:/app/data/KinFaceW-I:ro
      - ./data/KinFaceW-II:/app/data/KinFaceW-II:ro
      - ./models:/app/models
      - ./models/01_age_synthesis_comparison/output:/app/models/01_age_synthesis_comparison/output
      - ./models/02_vit_facor_crossattn/output:/app/models/02_vit_facor_crossattn/output
      - ./models/03_convnext_vit_hybrid/output:/app/models/03_convnext_vit_hybrid/output
      - ./models/04_unified_kinship_model/output:/app/models/04_unified_kinship_model/output
    environment:
      <<: *training-env
      NVIDIA_VISIBLE_DEVICES: all
      CUDA_VISIBLE_DEVICES: ${GPU_ID:-0}
    command: >
      bash -c "
        set -e
        echo '============================================'
        echo 'Kinship Classification Pipeline'
        echo '============================================'
        echo 'Epochs: $${EPOCHS}'
        echo 'Batch Size: $${BATCH_SIZE}'
        echo 'GPU ID: $${GPU_ID}'
        echo 'Learning Rate: $${LEARNING_RATE}'
        echo 'Dataset: $${TRAIN_DATASET}'
        echo '============================================'

        cd /app/models

        for model_dir in 01_* 02_* 03_* 04_*; do
          echo ''
          echo '============================================'
          echo \"Processing $${model_dir}\"
          echo '============================================'

          cd $${model_dir}
          mkdir -p output/checkpoints output/results output/logs

          echo '[1/3] Training...'
          cd Nvidia
          python train.py \
            --train_dataset $${TRAIN_DATASET} \
            --epochs $${EPOCHS} \
            --batch_size $${BATCH_SIZE} \
            --learning_rate $${LEARNING_RATE} \
            --checkpoint_dir ../output/checkpoints \
            2>&1 | tee ../output/logs/train.log

          echo '[2/3] Testing...'
          python test.py \
            --checkpoint ../output/checkpoints/best.pt \
            --output_dir ../output/results \
            2>&1 | tee ../output/logs/test.log

          echo '[3/3] Evaluating...'
          python evaluate.py \
            --checkpoint ../output/checkpoints/best.pt \
            --output_dir ../output/results \
            --full_analysis \
            2>&1 | tee ../output/logs/evaluate.log

          cd ../..
          echo \"Completed $${model_dir}\"
        done

        echo ''
        echo '============================================'
        echo 'All models completed!'
        echo '============================================'
      "
    stdin_open: true
    tty: true

  nvidia-shell:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia-shell"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-shell
    <<: *nvidia-common
    volumes:
      - ./data/FIW:/app/data/FIW
      - ./data/KinFaceW-I:/app/data/KinFaceW-I
      - ./data/KinFaceW-II:/app/data/KinFaceW-II
      - ./models:/app/models
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    command: bash
    stdin_open: true
    tty: true

  # ===========================================================================
  # AMD ROCm Services (Linux only)
  # ===========================================================================
  amd-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-pipeline
    <<: *amd-common
    volumes:
      - ./data/FIW:/app/data/FIW:ro
      - ./data/KinFaceW-I:/app/data/KinFaceW-I:ro
      - ./data/KinFaceW-II:/app/data/KinFaceW-II:ro
      - ./models:/app/models
      - ./models/01_age_synthesis_comparison/output:/app/models/01_age_synthesis_comparison/output
      - ./models/02_vit_facor_crossattn/output:/app/models/02_vit_facor_crossattn/output
      - ./models/03_convnext_vit_hybrid/output:/app/models/03_convnext_vit_hybrid/output
      - ./models/04_unified_kinship_model/output:/app/models/04_unified_kinship_model/output
    environment:
      <<: *training-env
      HIP_VISIBLE_DEVICES: ${GPU_ID:-0}
      ROCR_VISIBLE_DEVICES: ${GPU_ID:-0}
    command: >
      bash -c "
        set -e
        echo '============================================'
        echo 'Kinship Classification Pipeline (AMD ROCm)'
        echo '============================================'
        echo 'Epochs: $${EPOCHS}'
        echo 'Batch Size: $${BATCH_SIZE}'
        echo 'GPU ID: $${GPU_ID}'
        echo 'Learning Rate: $${LEARNING_RATE}'
        echo 'Dataset: $${TRAIN_DATASET}'
        echo '============================================'

        cd /app/models

        for model_dir in 01_* 02_* 03_* 04_*; do
          echo ''
          echo '============================================'
          echo \"Processing $${model_dir}\"
          echo '============================================'

          cd $${model_dir}
          mkdir -p output/checkpoints output/results output/logs

          echo '[1/3] Training...'
          cd AMD
          python train.py \
            --train_dataset $${TRAIN_DATASET} \
            --epochs $${EPOCHS} \
            --batch_size $${BATCH_SIZE} \
            --learning_rate $${LEARNING_RATE} \
            --checkpoint_dir ../output/checkpoints \
            2>&1 | tee ../output/logs/train.log

          echo '[2/3] Testing...'
          python test.py \
            --checkpoint ../output/checkpoints/best.pt \
            --output_dir ../output/results \
            2>&1 | tee ../output/logs/test.log

          echo '[3/3] Evaluating...'
          python evaluate.py \
            --checkpoint ../output/checkpoints/best.pt \
            --output_dir ../output/results \
            --full_analysis \
            2>&1 | tee ../output/logs/evaluate.log

          cd ../..
          echo \"Completed $${model_dir}\"
        done

        echo ''
        echo '============================================'
        echo 'All models completed!'
        echo '============================================'
      "
    stdin_open: true
    tty: true

  amd-shell:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd-shell"]
    image: kinship-amd:latest
    container_name: kinship-amd-shell
    <<: *amd-common
    volumes:
      - ./data/FIW:/app/data/FIW
      - ./data/KinFaceW-I:/app/data/KinFaceW-I
      - ./data/KinFaceW-II:/app/data/KinFaceW-II
      - ./models:/app/models
    command: bash
    stdin_open: true
    tty: true

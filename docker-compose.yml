# =============================================================================
# Kinship Classification - Docker Compose Configuration
# =============================================================================
# This file provides easy orchestration for running the kinship models.
#
# Usage:
#   NVIDIA GPU:  docker-compose --profile nvidia up
#   AMD GPU:     docker-compose --profile amd up
#   Training:    docker-compose run nvidia-train
#   Evaluation:  docker-compose run nvidia-eval
#
# Volume Management:
#   # Copy datasets to volumes (first time setup)
#   docker run --rm -v kinship_fiw:/data -v /path/to/FIW:/src:ro alpine cp -r /src/. /data/
#   docker run --rm -v kinship_kinface1:/data -v /path/to/KinFaceW-I:/src:ro alpine cp -r /src/. /data/
#
#   # List volumes
#   docker volume ls | grep kinship
#
#   # Inspect volume
#   docker volume inspect kinship_fiw
# =============================================================================

version: '3.8'

# =============================================================================
# Shared configuration
# =============================================================================
x-nvidia-common: &nvidia-common
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-amd-common: &amd-common
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add:
    - video

x-dataset-volumes: &dataset-volumes
  - fiw_data:/app/data/FIW:ro
  - kinface1_data:/app/data/KinFaceW-I:ro
  - kinface2_data:/app/data/KinFaceW-II:ro

x-output-volumes: &output-volumes
  - checkpoints:/app/checkpoints
  - results:/app/results

services:
  # ===========================================================================
  # NVIDIA GPU Services
  # ===========================================================================
  nvidia-train:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-train
    <<: *nvidia-common
    volumes:
      - fiw_data:/app/data/FIW:ro
      - kinface1_data:/app/data/KinFaceW-I:ro
      - kinface2_data:/app/data/KinFaceW-II:ro
      - checkpoints:/app/checkpoints
      - ./models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    command: >
      bash -c "cd /app/models && ./run_all_models_nvidia.sh 50 16 0"
    stdin_open: true
    tty: true

  nvidia-eval:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-eval
    <<: *nvidia-common
    volumes:
      - fiw_data:/app/data/FIW:ro
      - kinface1_data:/app/data/KinFaceW-I:ro
      - kinface2_data:/app/data/KinFaceW-II:ro
      - checkpoints:/app/checkpoints:ro
      - results:/app/results
      - ./models:/app/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      bash -c "
        cd /app/models &&
        for model_dir in 01_* 02_* 03_* 04_*; do
          echo \"Evaluating $${model_dir}...\" &&
          cd $${model_dir}/Nvidia &&
          python evaluate.py --checkpoint /app/checkpoints/$${model_dir}/best.pt --output_dir /app/results/$${model_dir} --full_analysis 2>/dev/null || true &&
          cd ../..
        done
      "
    stdin_open: true
    tty: true

  nvidia-shell:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-shell
    <<: *nvidia-common
    volumes:
      - fiw_data:/app/data/FIW
      - kinface1_data:/app/data/KinFaceW-I
      - kinface2_data:/app/data/KinFaceW-II
      - checkpoints:/app/checkpoints
      - results:/app/results
      - ./models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: bash
    stdin_open: true
    tty: true

  # ===========================================================================
  # AMD ROCm Services (Linux only)
  # ===========================================================================
  amd-train:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-train
    <<: *amd-common
    volumes:
      - fiw_data:/app/data/FIW:ro
      - kinface1_data:/app/data/KinFaceW-I:ro
      - kinface2_data:/app/data/KinFaceW-II:ro
      - checkpoints:/app/checkpoints
      - ./models:/app/models
    environment:
      - HIP_VISIBLE_DEVICES=0
      - ROCR_VISIBLE_DEVICES=0
    command: >
      bash -c "cd /app/models && ./run_all_models_amd.sh 50 16 0"
    stdin_open: true
    tty: true

  amd-eval:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-eval
    <<: *amd-common
    volumes:
      - fiw_data:/app/data/FIW:ro
      - kinface1_data:/app/data/KinFaceW-I:ro
      - kinface2_data:/app/data/KinFaceW-II:ro
      - checkpoints:/app/checkpoints:ro
      - results:/app/results
      - ./models:/app/models:ro
    command: >
      bash -c "
        cd /app/models &&
        for model_dir in 01_* 02_* 03_* 04_*; do
          echo \"Evaluating $${model_dir}...\" &&
          cd $${model_dir}/AMD &&
          python evaluate.py --checkpoint /app/checkpoints/$${model_dir}/best.pt --output_dir /app/results/$${model_dir} --full_analysis 2>/dev/null || true &&
          cd ../..
        done
      "
    stdin_open: true
    tty: true

  amd-shell:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-shell
    <<: *amd-common
    volumes:
      - fiw_data:/app/data/FIW
      - kinface1_data:/app/data/KinFaceW-I
      - kinface2_data:/app/data/KinFaceW-II
      - checkpoints:/app/checkpoints
      - results:/app/results
      - ./models:/app/models
    command: bash
    stdin_open: true
    tty: true

  # ===========================================================================
  # Data Management Services
  # ===========================================================================

  # Helper service to copy FIW dataset to volume
  copy-fiw:
    image: alpine:latest
    profiles: ["setup"]
    volumes:
      - fiw_data:/dest
      - ${FIW_SOURCE_PATH:-./_placeholder}:/src:ro
    command: >
      sh -c "
        if [ -d /src/FIDs ] || [ -f /src/FIW_PIDs_v2.csv ]; then
          echo 'Copying FIW dataset to volume...' &&
          cp -rv /src/. /dest/ &&
          echo 'Done! FIW dataset copied.'
        else
          echo 'ERROR: FIW source path does not contain valid dataset.'
          echo 'Set FIW_SOURCE_PATH environment variable to your FIW dataset location.'
          exit 1
        fi
      "

  # Helper service to copy KinFaceW-I dataset to volume
  copy-kinface1:
    image: alpine:latest
    profiles: ["setup"]
    volumes:
      - kinface1_data:/dest
      - ${KINFACE1_SOURCE_PATH:-./_placeholder}:/src:ro
    command: >
      sh -c "
        if [ -d /src/images ]; then
          echo 'Copying KinFaceW-I dataset to volume...' &&
          cp -rv /src/. /dest/ &&
          echo 'Done! KinFaceW-I dataset copied.'
        else
          echo 'ERROR: KinFaceW-I source path does not contain valid dataset.'
          echo 'Set KINFACE1_SOURCE_PATH environment variable to your KinFaceW-I dataset location.'
          exit 1
        fi
      "

  # Helper service to copy KinFaceW-II dataset to volume
  copy-kinface2:
    image: alpine:latest
    profiles: ["setup"]
    volumes:
      - kinface2_data:/dest
      - ${KINFACE2_SOURCE_PATH:-./_placeholder}:/src:ro
    command: >
      sh -c "
        if [ -d /src/images ]; then
          echo 'Copying KinFaceW-II dataset to volume...' &&
          cp -rv /src/. /dest/ &&
          echo 'Done! KinFaceW-II dataset copied.'
        else
          echo 'ERROR: KinFaceW-II source path does not contain valid dataset.'
          echo 'Set KINFACE2_SOURCE_PATH environment variable to your KinFaceW-II dataset location.'
          exit 1
        fi
      "

  # List volume contents
  list-data:
    image: alpine:latest
    profiles: ["setup"]
    volumes:
      - fiw_data:/data/FIW:ro
      - kinface1_data:/data/KinFaceW-I:ro
      - kinface2_data:/data/KinFaceW-II:ro
    command: >
      sh -c "
        echo '=== FIW Dataset ===' &&
        ls -la /data/FIW 2>/dev/null || echo '(empty)' &&
        echo '' &&
        echo '=== KinFaceW-I Dataset ===' &&
        ls -la /data/KinFaceW-I 2>/dev/null || echo '(empty)' &&
        echo '' &&
        echo '=== KinFaceW-II Dataset ===' &&
        ls -la /data/KinFaceW-II 2>/dev/null || echo '(empty)'
      "

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  # Dataset volumes (persistent storage for datasets)
  fiw_data:
    name: kinship_fiw
    labels:
      description: "FIW (Families In the Wild) dataset"

  kinface1_data:
    name: kinship_kinface1
    labels:
      description: "KinFaceW-I dataset"

  kinface2_data:
    name: kinship_kinface2
    labels:
      description: "KinFaceW-II dataset"

  # Output volumes
  checkpoints:
    name: kinship_checkpoints
    labels:
      description: "Model checkpoints"

  results:
    name: kinship_results
    labels:
      description: "Evaluation results"

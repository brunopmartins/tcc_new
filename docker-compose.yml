# =============================================================================
# Kinship Classification - Docker Compose Configuration
# =============================================================================
# This file provides easy orchestration for running the kinship models.
#
# Usage:
#   NVIDIA GPU:  docker-compose --profile nvidia up
#   AMD GPU:     docker-compose --profile amd up
#   Training:    docker-compose run nvidia-train
#   Evaluation:  docker-compose run nvidia-eval
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # NVIDIA GPU Services
  # ===========================================================================
  nvidia-train:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-train
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    command: >
      bash -c "cd /app/models && ./run_all_models_nvidia.sh 50 16 0"
    stdin_open: true
    tty: true

  nvidia-eval:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-eval
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      bash -c "
        cd /app/models &&
        for model_dir in 01_* 02_* 03_* 04_*; do
          echo \"Evaluating $${model_dir}...\" &&
          cd $${model_dir}/Nvidia &&
          python evaluate.py --checkpoint ../../checkpoints/$${model_dir}/best.pt --output_dir /app/results/$${model_dir} --full_analysis 2>/dev/null || true &&
          cd ../..
        done
      "
    stdin_open: true
    tty: true

  nvidia-shell:
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    profiles: ["nvidia"]
    image: kinship-nvidia:latest
    container_name: kinship-nvidia-shell
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: bash
    stdin_open: true
    tty: true

  # ===========================================================================
  # AMD ROCm Services (Linux only)
  # ===========================================================================
  amd-train:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-train
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
    environment:
      - HIP_VISIBLE_DEVICES=0
      - ROCR_VISIBLE_DEVICES=0
    command: >
      bash -c "cd /app/models && ./run_all_models_amd.sh 50 16 0"
    stdin_open: true
    tty: true

  amd-eval:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-eval
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - ./results:/app/results
    command: >
      bash -c "
        cd /app/models &&
        for model_dir in 01_* 02_* 03_* 04_*; do
          echo \"Evaluating $${model_dir}...\" &&
          cd $${model_dir}/AMD &&
          python evaluate.py --checkpoint ../../checkpoints/$${model_dir}/best.pt --output_dir /app/results/$${model_dir} --full_analysis 2>/dev/null || true &&
          cd ../..
        done
      "
    stdin_open: true
    tty: true

  amd-shell:
    build:
      context: .
      dockerfile: Dockerfile.amd
    profiles: ["amd"]
    image: kinship-amd:latest
    container_name: kinship-amd-shell
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - ./results:/app/results
    command: bash
    stdin_open: true
    tty: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  data:
  checkpoints:
  results:

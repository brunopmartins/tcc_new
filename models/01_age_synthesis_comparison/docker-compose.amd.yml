# =============================================================================
# Model 01: Age Synthesis Comparison - AMD ROCm Docker Compose
# =============================================================================
# Standalone docker-compose for running the Age Synthesis model on AMD GPUs.
#
# Usage:
#   sudo docker compose -f docker-compose.amd.yml up
#
# With custom parameters:
#   EPOCHS=100 BATCH_SIZE=32 sudo docker compose -f docker-compose.amd.yml up
#
# Interactive shell:
#   sudo docker compose -f docker-compose.amd.yml run shell
#
# Note: Requires Linux host with amdgpu kernel driver loaded.
# =============================================================================

services:
  pipeline:
    build:
      context: ../..
      dockerfile: Dockerfile.amd
    image: kinship-amd:latest
    container_name: model01-amd-pipeline
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"   # render group GID — required for /dev/kfd and /dev/dri/renderD128
    volumes:
      # Mount datasets at exactly the paths config.py expects
      - ../../datasets/FIW:/home/bruno/Desktop/tcc_new/datasets/FIW:ro
      - ../../datasets/KinFaceW-I:/home/bruno/Desktop/tcc_new/datasets/KinFaceW-I:ro
      - ../../datasets/KinFaceW-II:/home/bruno/Desktop/tcc_new/datasets/KinFaceW-II:ro
      # Live-mount scripts so changes reflect without rebuild
      - ./AMD:/app/models/01_age_synthesis_comparison/AMD:ro
      - ../shared:/app/models/shared:ro
      # Output: logs, checkpoints, results written here on the host
      - ./output:/app/output
    environment:
      EPOCHS: ${EPOCHS:-100}
      BATCH_SIZE: ${BATCH_SIZE:-32}
      GPU_ID: ${GPU_ID:-0}
      LEARNING_RATE: ${LEARNING_RATE:-1e-4}
      TRAIN_DATASET: ${TRAIN_DATASET:-kinface}
      USE_AGE_SYNTHESIS: ${USE_AGE_SYNTHESIS:-1}
      HIP_VISIBLE_DEVICES: ${GPU_ID:-0}
      ROCR_VISIBLE_DEVICES: ${GPU_ID:-0}
      # RX 6700 XT (gfx1031) compatibility — maps to gfx1030 for ROCm 5.7
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
    shm_size: '2gb'   # PyTorch DataLoader workers use /dev/shm; default 64 MB is too small
    working_dir: /app/models/01_age_synthesis_comparison/AMD
    command: bash run_pipeline.sh
    stdin_open: true
    tty: true

  shell:
    build:
      context: ../..
      dockerfile: Dockerfile.amd
    image: kinship-amd:latest
    container_name: model01-amd-shell
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"   # render group GID
    volumes:
      - ../../datasets/FIW:/home/bruno/Desktop/tcc_new/datasets/FIW
      - ../../datasets/KinFaceW-I:/home/bruno/Desktop/tcc_new/datasets/KinFaceW-I
      - ../../datasets/KinFaceW-II:/home/bruno/Desktop/tcc_new/datasets/KinFaceW-II
      - ./AMD:/app/models/01_age_synthesis_comparison/AMD
      - ../shared:/app/models/shared
      - ./output:/app/output
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
    working_dir: /app/models/01_age_synthesis_comparison/AMD
    command: bash
    stdin_open: true
    tty: true
    profiles: ["shell"]

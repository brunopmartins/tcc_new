# =============================================================================
# Model 05: DINOv2 + LoRA + Differential FaCoR — AMD ROCm Docker Compose
# =============================================================================
# Standalone compose for running Model 05 on AMD GPUs (ROCm).
#
# Usage:
#   docker-compose -f docker-compose.amd.yml up
#
# Override parameters:
#   EPOCHS=60 BATCH_SIZE=2 GRAD_ACCUM=16 docker-compose -f docker-compose.amd.yml up
#
# Interactive shell:
#   docker-compose -f docker-compose.amd.yml run shell
#
# Notes:
#   - Requires ROCm on the host (/dev/kfd, /dev/dri visible).
#   - Defaults are sized for the 12 GB VRAM of the AMD RX 6750 XT.
# =============================================================================

services:
  pipeline:
    build:
      context: ../..
      dockerfile: Dockerfile.amd
    image: kinship-amd:latest
    container_name: model05-amd-pipeline
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ../../data/FIW:/app/data/FIW:ro
      - ../../data/KinFaceW-I:/app/data/KinFaceW-I:ro
      - ../../data/KinFaceW-II:/app/data/KinFaceW-II:ro
      - ./AMD:/app/models/05_dinov2_lora_diffattn/AMD:ro
      - ./model.py:/app/models/05_dinov2_lora_diffattn/model.py:ro
      - ../shared:/app/models/shared:ro
      - ./output:/app/output
    environment:
      EPOCHS: ${EPOCHS:-80}
      BATCH_SIZE: ${BATCH_SIZE:-4}
      GRAD_ACCUM: ${GRAD_ACCUM:-8}
      LEARNING_RATE: ${LEARNING_RATE:-3e-4}
      TRAIN_DATASET: ${TRAIN_DATASET:-fiw}
      BACKBONE: ${BACKBONE:-vit_base_patch14_dinov2.lvd142m}
      LORA_RANK: ${LORA_RANK:-8}
      LORA_ALPHA: ${LORA_ALPHA:-16}
      RELATION_LOSS_WEIGHT: ${RELATION_LOSS_WEIGHT:-0.2}
      GPU_ID: ${GPU_ID:-0}
      HIP_VISIBLE_DEVICES: ${GPU_ID:-0}
      ROCR_VISIBLE_DEVICES: ${GPU_ID:-0}
    working_dir: /app/models/05_dinov2_lora_diffattn/AMD
    command: >
      bash -c "
        set -e
        echo '============================================'
        echo 'Model 05: DINOv2 + LoRA + DiffAttn'
        echo 'Platform: AMD ROCm'
        echo '============================================'
        echo 'Epochs:        '$${EPOCHS}
        echo 'Batch size:    '$${BATCH_SIZE}
        echo 'Grad accum:    '$${GRAD_ACCUM}
        echo 'Dataset:       '$${TRAIN_DATASET}
        echo 'Backbone:      '$${BACKBONE}
        echo 'LoRA rank:     '$${LORA_RANK}
        echo 'GPU ID:        '$${GPU_ID}
        echo '============================================'

        mkdir -p /app/output/checkpoints /app/output/results /app/output/logs

        echo '[1/3] Training...'
        python train.py \
          --train_dataset          $${TRAIN_DATASET} \
          --epochs                 $${EPOCHS} \
          --batch_size             $${BATCH_SIZE} \
          --gradient_accumulation  $${GRAD_ACCUM} \
          --lr                     $${LEARNING_RATE} \
          --backbone_name          $${BACKBONE} \
          --lora_rank              $${LORA_RANK} \
          --lora_alpha             $${LORA_ALPHA} \
          --relation_loss_weight   $${RELATION_LOSS_WEIGHT} \
          --checkpoint_dir         /app/output/checkpoints \
          2>&1 | tee /app/output/logs/train.log

        echo '[2/3] Testing...'
        python test.py \
          --checkpoint /app/output/checkpoints/best.pt \
          --dataset    $${TRAIN_DATASET} \
          --batch_size $${BATCH_SIZE} \
          --output_dir /app/output/results \
          2>&1 | tee /app/output/logs/test.log

        echo '[3/3] Evaluating...'
        python evaluate.py \
          --checkpoint /app/output/checkpoints/best.pt \
          --dataset    $${TRAIN_DATASET} \
          --batch_size $${BATCH_SIZE} \
          --output_dir /app/output/results \
          --full_analysis \
          2>&1 | tee /app/output/logs/evaluate.log

        echo ''
        echo '============================================'
        echo 'Model 05 completed.'
        echo 'Results saved to ./output/'
        echo '============================================'
      "
    stdin_open: true
    tty: true

  shell:
    build:
      context: ../..
      dockerfile: Dockerfile.amd
    image: kinship-amd:latest
    container_name: model05-amd-shell
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ../../data/FIW:/app/data/FIW
      - ../../data/KinFaceW-I:/app/data/KinFaceW-I
      - ../../data/KinFaceW-II:/app/data/KinFaceW-II
      - ./AMD:/app/models/05_dinov2_lora_diffattn/AMD
      - ./model.py:/app/models/05_dinov2_lora_diffattn/model.py
      - ../shared:/app/models/shared
      - ./output:/app/output
    working_dir: /app/models/05_dinov2_lora_diffattn/AMD
    command: bash
    stdin_open: true
    tty: true
    profiles: ["shell"]
